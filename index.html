<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">

  <meta name="theme-color" content="#2563eb">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="DC Infra Sanity">
  <meta name="application-name" content="DC Infra Sanity">
  <meta name="description" content="Data Center Infrastructure hardware sanity inspection tool — Digital COE Gen AI Team">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <link rel="icon" type="image/svg+xml" href="icons/icon-192.svg">

  <title>DC Infra Sanity</title>

  <link rel="stylesheet" href="css/styles.css">

  <style>
    body { background: #f1f5f9; }
    #app-loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100dvh;
      color: #94a3b8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      gap: 12px;
    }
    #app-loading .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e2e8f0; border-top-color: #2563eb;
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #app-loading .load-label { font-size: 14px; font-weight: 500; }
  </style>
</head>
<body>

  <div id="app">
    <div id="app-loading">
      <div class="spinner"></div>
      <div class="load-label">DC Infra Sanity</div>
    </div>
  </div>

  <!--
    Script load order:
      1. data.js     – LED_OPTIONS, DC_SYSTEMS, computeOverallStatus
      2. storage.js  – Storage (localStorage + IndexedDB for photos)
      3. camera.js   – Camera (photo capture, compression, thumbnails)
      4. export.js   – Export (CSV, XLS, HTML report, email)
      5. app.js      – App, Views, AppState
  -->
  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/camera.js"></script>
  <script src="js/export.js"></script>
  <script src="js/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>

</body>
</html>
